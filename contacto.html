<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | AMS Shocks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body { background-color: var(--dark-gray); }

        /* Encabezado de la página de contacto */
        .hero-contacto {
            padding-top: 160px;
            padding-bottom: 60px;
            text-align: center;
            background:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
                var(--black-bg);
            background-size: 60px 60px, 60px 60px, auto;
            color: var(--white-bg);
            border-bottom: 3px solid var(--primary-color);
            position: relative;
        }

        .hero-contacto h1 {
            font-family: var(--font-heading);
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 10px;
        }

        .hero-contacto p {
            color: var(--steel-light);
            font-family: var(--font-body);
            font-size: 1.1rem;
        }

        /* Contenedor Grid para los dos formularios */
        .formularios-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 5%;
        }

        /* Industrial dark card with beveled corners */
        .form-box {
            background: linear-gradient(180deg,
                var(--primary-color) 0px,
                var(--primary-color) 4px,
                #1c1c1c 4px,
                #141414 100%
            );
            padding: 44px 40px 40px;
            clip-path: polygon(
                0 0,
                calc(100% - 20px) 0,
                100% 20px,
                100% 100%,
                20px 100%,
                0 calc(100% - 20px)
            );
            filter: drop-shadow(0 15px 40px rgba(0, 0, 0, 0.55));
            position: relative;
        }

        /* Rivet dots (top-left safe from bevel, bottom-right safe) */
        .form-box::before,
        .form-box::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 35%, #888, #222);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.22), 0 1px 3px rgba(0,0,0,0.9);
        }
        .form-box::before { top: 14px;    left:  14px; }
        .form-box::after  { bottom: 14px; right: 14px; }

        .form-box h2 {
            font-family: var(--font-heading);
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .hero-contacto { padding-top: 200px; }
            .formularios-wrapper { grid-template-columns: 1fr; }
            .row-3 { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>

<body>

    <!-- Menú de Navegación -->
    <header>
        <a href="index.html" class="logo">
            <img src="img/logo.png" alt="Logo AMS Shocks">
        </a>
        <nav>
            <a href="index.html#inicio">Inicio</a>
            <a href="index.html#nosotros">Quiénes Somos</a>
            <a href="index.html#productos">Productos</a>
            <a href="contacto.html" style="color: var(--primary-color);">Contacto</a>
        </nav>
    </header>

    <!-- Encabezado -->
    <section class="hero-contacto">
        <h1>Contáctanos</h1>
        <p>Selecciona el formulario adecuado para que podamos atenderte con la mayor precisión.</p>
    </section>

    <!-- Sección de Formularios -->
    <div class="formularios-wrapper">

        <!-- FORMULARIO 1: Solicitud de Cotización -->
        <div class="form-box">
            <h2>Solicitud de Cotización</h2>
            <form action="https://formsubmit.co/ventas@amsshocks.com" method="POST">
                <!-- Configuración oculta -->
                <input type="hidden" name="_subject" value="NUEVA COTIZACIÓN desde la Web">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_next" value="https://amsshocks.com/index.html">

                <!-- Datos de Contacto -->
                <input type="text" name="Nombre" placeholder="Nombre completo" required>
                <input type="tel" name="Telefono" placeholder="Teléfono" required>
                <input type="email" name="Correo" placeholder="Correo electrónico" required>

                <!-- Datos del Vehículo -->
                <div class="row-3">
                    <input type="text" name="Marca_Vehiculo" placeholder="Marca (Ej: Toyota)" required>
                    <input type="text" name="Modelo_Vehiculo" placeholder="Modelo (Ej: Tacoma)" required>
                    <input type="number" name="Año_Vehiculo" placeholder="Año" required>
                </div>

                <textarea name="Mensaje" placeholder="Detalles de la suspensión (Uso en competencia, calle, requerimientos específicos...)" required></textarea>

                <button type="submit">Enviar Cotización</button>
            </form>
        </div>

        <!-- FORMULARIO 2: Contacto Comercial -->
        <div class="form-box">
            <h2>Contacto Comercial</h2>
            <form action="https://formsubmit.co/ventas@amsshocks.com" method="POST">
                <!-- Configuración oculta -->
                <input type="hidden" name="_subject" value="NUEVO CONTACTO COMERCIAL desde la Web">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_next" value="https://amsshocks.com/index.html">

                <input type="text" name="Nombre" placeholder="Nombre de la empresa o distribuidor" required>
                <input type="tel" name="Telefono" placeholder="Teléfono de contacto" required>
                <input type="email" name="Correo" placeholder="Correo electrónico corporativo" required>

                <textarea name="Mensaje" placeholder="¿En qué podemos ayudarte? (Distribución, alianzas, consultas generales)" required></textarea>

                <button type="submit">Enviar Mensaje</button>
            </form>
        </div>

    </div><!-- /.formularios-wrapper -->

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 AMS Shocks. Todos los derechos reservados.</p>
        <p>ventas@amsshocks.com</p>
    </footer>

</body>
</html>
